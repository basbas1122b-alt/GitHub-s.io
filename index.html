<!DOCTYPE html>
<html lang="th">
<head>

    <title>รับเช่า-ให้เช่า พระเครื่องแท้</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #fdf6e3; padding: 20px; }
        .box { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #b8860b; margin: 0 0 10px 0; font-size: 28px; }
        .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .phra-card { background: #fffbf0; border-radius: 10px; padding: 10px; border: 1px solid #f0e6d2; }
        .phra-card img { width: 100%; border-radius: 8px; height: 200px; object-fit: cover; }
        .phra-card p { margin: 8px 0 0 0; font-weight: bold; color: #333; }
        .btn { background: #b8860b; color: white; padding: 15px 30px; text-decoration: none; border-radius: 50px; display: inline-block; margin-top: 15px; font-weight: bold; font-size: 18px; }
        .contact { background: #fff8dc; padding: 15px; border-radius: 10px; margin-top: 20px; }
.phra-card img:hover {
    transform: scale(1.05);
    transition: 0.3s;
}
    </style>
</head>

            LINE: 08864184271<br>

        <p style="font-size:14px; margin-top:25px;">#พระเครื่อง #พระแท้ #รับเช่าพระ #พระยอดนิยม</p>
